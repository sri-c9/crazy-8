<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Insane Crazy 8 - Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Comic+Neue:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .picker-overlay { position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center; }
    .picker-overlay.hidden { display: none !important; }
    .picker-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
    .picker-dialog { position: relative; background: #1f2430; border-radius: 16px; padding: 20px; width: min(90vw, 360px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
    .picker-title { color: #fff; margin: 0 0 14px; font-size: 1.1rem; text-align: center; }
    .god-power-btn { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; width: 100%; margin: 8px 0; padding: 14px 16px; border: none; border-radius: 12px; background: #2d3446; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; text-align: left; }
    .god-power-btn small { font-weight: 400; opacity: 0.7; font-size: 0.8rem; }
    .god-power-btn:active { transform: scale(0.98); }
    .hand-locked { opacity: 0.5; pointer-events: none; }
    @keyframes luckyPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,210,80,0); } 50% { box-shadow: 0 0 18px 6px rgba(255,210,80,0.85); } }
    .draw-pile-lucky { animation: luckyPulse 0.9s ease-in-out infinite; border-radius: 12px; }
    .opponent-revealed-hand { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 120px; }
    .mini-card { transform: scale(0.42); transform-origin: center; margin: -18px -10px; }
    @keyframes fxFlash { 0% { opacity: 0; } 20% { opacity: 0.9; } 100% { opacity: 0; } }
    .fx-flash { position: fixed; inset: 0; z-index: 80; pointer-events: none; background: radial-gradient(circle at center, #fff 0%, #ffb347 40%, transparent 70%); animation: fxFlash 0.5s ease-out forwards; }
    @keyframes fxEyeBlink { 0% { transform: translate(-50%,-50%) scale(0.4); opacity: 0; } 30% { transform: translate(-50%,-50%) scale(1.1); opacity: 1; } 70% { transform: translate(-50%,-50%) scale(1); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1.2); opacity: 0; } }
    .fx-eye { position: fixed; z-index: 80; pointer-events: none; font-size: 96px; animation: fxEyeBlink 1.2s ease-in-out forwards; }
  </style>
</head>
<body class="game-body">
  <!-- Top Bar -->
  <div class="top-bar">
    <span class="room-badge" id="roomBadge">----</span>
    <button class="menu-btn" id="menuBtn" title="Menu">⋮</button>
  </div>

  <!-- Opponents Area -->
  <div class="opponents-ring" id="opponentsList">
    <!-- Opponent nodes rendered here -->
  </div>

  <!-- Center: Draw & Discard Piles -->
  <div class="center-area">
    <!-- Pending Draws Alert -->
    <div id="pendingAlert" class="pending-alert hidden">
      ⚠️ <span id="pendingCount">0</span> cards pending!
    </div>

    <!-- Disconnected Player Alert -->
    <div id="disconnectedAlert" class="pending-alert hidden" style="border-color: var(--ink-mid);">
      📶 Waiting for <span id="disconnectedName">player</span> to reconnect...
    </div>

    <div class="piles-container">
      <!-- Draw Pile -->
      <div class="pile draw-pile" id="drawPile">
        <div class="draw-pile-stack">
          <div class="card-back stack-card"></div>
          <div class="card-back stack-card"></div>
          <div class="card-back stack-card"></div>
        </div>
        <button id="drawBtn" class="draw-btn">Draw</button>
      </div>

      <!-- Discard Pile -->
      <div class="pile discard-pile">
        <div id="topCard" class="card">
          <span class="card-value">?</span>
        </div>
      </div>
    </div>

    <!-- Direction Indicator -->
    <div class="direction-indicator clockwise" id="directionIndicator">
      <svg class="direction-arrow" id="directionArrow" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M16 4a12 12 0 1 1-9 4"/>
        <polyline points="7,8 7,16 15,16"/>
      </svg>
    </div>
  </div>

  <!-- Your Hand -->
  <div class="hand-area">
    <div class="hand-info">
      <span class="card-count-badge" id="cardCount">0</span>
    </div>
    <div id="handCards" class="hand-fan">
      <!-- Cards rendered here -->
    </div>
  </div>

  <!-- Color Picker Modal -->
  <div id="colorPicker" class="modal hidden">
    <div class="modal-overlay" id="colorPickerOverlay"></div>
    <div class="modal-content color-picker-content">
      <h3>Choose a color:</h3>
      <div class="color-buttons">
        <button class="color-btn red" data-color="red" title="Red" aria-label="Red"></button>
        <button class="color-btn blue" data-color="blue" title="Blue" aria-label="Blue"></button>
        <button class="color-btn green" data-color="green" title="Green" aria-label="Green"></button>
        <button class="color-btn yellow" data-color="yellow" title="Yellow" aria-label="Yellow"></button>
      </div>
    </div>
  </div>

  <!-- Target Player Picker Modal -->
  <div id="targetPicker" class="modal hidden">
    <div class="modal-overlay" id="targetPickerOverlay"></div>
    <div class="modal-content target-picker-content">
      <h3>Choose a player to swap hands with:</h3>
      <div id="targetList" class="target-list"></div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div id="gameOver" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="confetti-burst" aria-hidden="true">
        <div class="confetti" style="--tx:-70px;--ty:-130px;--rot:720deg;background:var(--card-red);animation-delay:0ms"></div>
        <div class="confetti" style="--tx:70px;--ty:-120px;--rot:-720deg;background:var(--card-blue);animation-delay:40ms"></div>
        <div class="confetti" style="--tx:-50px;--ty:-150px;--rot:540deg;background:var(--card-green);animation-delay:80ms"></div>
        <div class="confetti" style="--tx:50px;--ty:-160px;--rot:-540deg;background:var(--card-yellow);animation-delay:120ms"></div>
        <div class="confetti" style="--tx:-90px;--ty:-90px;--rot:360deg;background:var(--color-primary);animation-delay:160ms"></div>
        <div class="confetti" style="--tx:90px;--ty:-100px;--rot:-360deg;background:var(--card-red);animation-delay:200ms"></div>
        <div class="confetti" style="--tx:-30px;--ty:-180px;--rot:810deg;background:var(--card-blue);animation-delay:240ms"></div>
        <div class="confetti" style="--tx:30px;--ty:-170px;--rot:-810deg;background:var(--card-green);animation-delay:280ms"></div>
        <div class="confetti" style="--tx:-110px;--ty:-70px;--rot:450deg;background:var(--card-yellow);animation-delay:320ms"></div>
        <div class="confetti" style="--tx:110px;--ty:-80px;--rot:-450deg;background:var(--color-primary);animation-delay:360ms"></div>
        <div class="confetti" style="--tx:0px;--ty:-190px;--rot:630deg;background:var(--card-red);animation-delay:400ms"></div>
        <div class="confetti" style="--tx:0px;--ty:-100px;--rot:-630deg;background:var(--card-blue);animation-delay:440ms"></div>
      </div>
      <h2>🎉 Game Over!</h2>
      <p class="winner-text"><span class="crown-icon">👑</span> <span id="winnerName"></span></p>
      <button id="backToLobbyBtn" class="btn btn-primary">Back to Lobby</button>
    </div>
  </div>

  <!-- God Mode Power Picker Modal -->
  <div id="godPowerPicker" class="picker-overlay hidden">
    <div id="godPowerPickerOverlay" class="picker-backdrop"></div>
    <div class="picker-dialog">
      <h3 class="picker-title">⚡ Choose your God Mode power</h3>
      <button class="god-power-btn" data-power="allSeeingEye">👁 All-Seeing Eye<small>Reveal every hand for one round</small></button>
      <button class="god-power-btn" data-power="bigBang">💥 Big Bang<small>Shuffle &amp; re-deal all hands</small></button>
      <button class="god-power-btn" data-power="reincarnation">♻️ Reincarnation<small>Everyone reborn with 7 fresh cards</small></button>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <p>Connecting...</p>
  </div>

  <script type="module" src="dist/game-client.js"></script>
</body>
</html>
