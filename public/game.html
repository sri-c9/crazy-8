<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Insane Crazy 8 - Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="game-body">
  <!-- Top Bar -->
  <div class="top-bar">
    <span class="room-badge" id="roomBadge">----</span>
    <button class="menu-btn" id="menuBtn" title="Menu">⋮</button>
  </div>

  <!-- Opponents Area -->
  <div class="opponents-ring" id="opponentsList">
    <!-- Opponent nodes rendered here -->
  </div>

  <!-- Center: Draw & Discard Piles -->
  <div class="center-area">
    <!-- Pending Draws Alert -->
    <div id="pendingAlert" class="pending-alert hidden">
      ⚠️ <span id="pendingCount">0</span> cards pending!
    </div>

    <!-- Disconnected Player Alert -->
    <div id="disconnectedAlert" class="pending-alert hidden" style="background: rgba(150,150,150,0.15); border-color: rgba(150,150,150,0.4);">
      📶 Waiting for <span id="disconnectedName">player</span> to reconnect...
    </div>

    <div class="piles-container">
      <!-- Draw Pile -->
      <div class="pile draw-pile">
        <div class="draw-pile-stack">
          <div class="card-back stack-card"></div>
          <div class="card-back stack-card"></div>
          <div class="card-back stack-card"></div>
        </div>
        <button id="drawBtn" class="draw-btn">Draw</button>
      </div>

      <!-- Discard Pile -->
      <div class="pile discard-pile">
        <div id="topCard" class="card">
          <span class="card-value">?</span>
        </div>
      </div>
    </div>

    <!-- Direction Indicator -->
    <div class="direction-indicator clockwise" id="directionIndicator">
      <span class="direction-arrow" id="directionArrow"></span>
    </div>
  </div>

  <!-- Your Hand -->
  <div class="hand-area">
    <div class="hand-info">
      <span class="card-count-badge" id="cardCount">0</span>
    </div>
    <div id="handCards" class="hand-fan">
      <!-- Cards rendered here -->
    </div>
  </div>

  <!-- Color Picker Modal -->
  <div id="colorPicker" class="modal hidden">
    <div class="modal-overlay" id="colorPickerOverlay"></div>
    <div class="modal-content color-picker-content">
      <h3>Choose a color:</h3>
      <div class="color-buttons">
        <button class="color-btn red" data-color="red" title="Red" aria-label="Red"></button>
        <button class="color-btn blue" data-color="blue" title="Blue" aria-label="Blue"></button>
        <button class="color-btn green" data-color="green" title="Green" aria-label="Green"></button>
        <button class="color-btn yellow" data-color="yellow" title="Yellow" aria-label="Yellow"></button>
      </div>
    </div>
  </div>

  <!-- Target Player Picker Modal -->
  <div id="targetPicker" class="modal hidden">
    <div class="modal-overlay" id="targetPickerOverlay"></div>
    <div class="modal-content target-picker-content">
      <h3>Choose a player to swap hands with:</h3>
      <div id="targetList" class="target-list"></div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div id="gameOver" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="confetti-burst" aria-hidden="true">
        <div class="confetti" style="--tx:-70px;--ty:-130px;--rot:720deg;background:var(--card-red);animation-delay:0ms"></div>
        <div class="confetti" style="--tx:70px;--ty:-120px;--rot:-720deg;background:var(--card-blue);animation-delay:40ms"></div>
        <div class="confetti" style="--tx:-50px;--ty:-150px;--rot:540deg;background:var(--card-green);animation-delay:80ms"></div>
        <div class="confetti" style="--tx:50px;--ty:-160px;--rot:-540deg;background:var(--card-yellow);animation-delay:120ms"></div>
        <div class="confetti" style="--tx:-90px;--ty:-90px;--rot:360deg;background:var(--color-primary);animation-delay:160ms"></div>
        <div class="confetti" style="--tx:90px;--ty:-100px;--rot:-360deg;background:var(--card-red);animation-delay:200ms"></div>
        <div class="confetti" style="--tx:-30px;--ty:-180px;--rot:810deg;background:var(--card-blue);animation-delay:240ms"></div>
        <div class="confetti" style="--tx:30px;--ty:-170px;--rot:-810deg;background:var(--card-green);animation-delay:280ms"></div>
        <div class="confetti" style="--tx:-110px;--ty:-70px;--rot:450deg;background:var(--card-yellow);animation-delay:320ms"></div>
        <div class="confetti" style="--tx:110px;--ty:-80px;--rot:-450deg;background:var(--color-primary);animation-delay:360ms"></div>
        <div class="confetti" style="--tx:0px;--ty:-190px;--rot:630deg;background:var(--card-red);animation-delay:400ms"></div>
        <div class="confetti" style="--tx:0px;--ty:-100px;--rot:-630deg;background:var(--card-blue);animation-delay:440ms"></div>
      </div>
      <h2>🎉 Game Over!</h2>
      <p class="winner-text"><span class="crown-icon">👑</span> <span id="winnerName"></span></p>
      <button id="backToLobbyBtn" class="btn btn-primary">Back to Lobby</button>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <p>Connecting...</p>
  </div>

  <script type="module" src="dist/game-client.js"></script>
</body>
</html>
